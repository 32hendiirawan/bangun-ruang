<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kerucut</title>
    <script type="text/javascript">
      if (top === self) {
        // Jika halaman dibuka langsung (tidak di dalam iframe),
        // alihkan paksa ke halaman utama blog Anda
        window.location.href = "https://o-cre.blogspot.com/2026/05/kalkulator-bangun-ruang.html";
      }
    </script>
    <link rel="stylesheet" href="bangunruang.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Kalkulator Kerucut</h2>
            <p class="description">Isi minimal 2 elemen</p>
            <img src="rumus/kerucut.png" alt="kerucut" height="120px">
        </div>

        <div class="element">
            <div>
                <label>Pilihan Nilai Pi (π)</label>
                <select id="pi-val" class="selectpi">
                    <option value="3.141592653589793">Math.PI (Presisi Tinggi)</option>
                    <option value="3.14">3.14 (Standar)</option>
                    <option value="3.142857142857143">22/7 (Pecahan)</option>
                </select>
            </div>
            <div>
                <label>Jari-jari (r)</label>
                <input type="number" id="r" class="input-field" placeholder="r">
            </div>
            <div>
                <label>Garis Pelukis (s)</label>
                <input type="number" id="s_slant" class="input-field" placeholder="s miring">
            </div>
            <div>
                <label>Tinggi (t)</label>
                <input type="number" id="t" class="input-field" placeholder="Tinggi tegak">
            </div>
            <div>
                <label>Volume (V)</label>
                <input type="number" id="v" class="input-field" placeholder="1/3 × πr²t">
            </div>
            <div>
                <label>Luas (L)</label>
                <input type="number" id="l" class="input-field" placeholder="πr(r + s)">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="hitungKerucut()" class="btn-menu">Hitung</button>
            <button onclick="resetForm()" class="btn-menu">Reset</button>
            <a href="../index.html" class="btn-menu">Home</a>
        </div>

        <p id="error-msg" class="message"></p>
    </div>

    <script>
        function hitungKerucut() {
            const pi = parseFloat(document.getElementById('pi-val').value);
            const fields = ['r', 's_slant', 't', 'v', 'l'];
            let vals = {};
            let isManual = {};

            fields.forEach(id => {
                const el = document.getElementById(id);
                const val = parseFloat(el.value);
                vals[id] = val;
                isManual[id] = !isNaN(val);
                el.classList.remove('result-field');
                el.classList.add('input-field');
            });

            if (Object.values(isManual).filter(v => v).length < 2) {
                document.getElementById('error-msg').innerText = "⚠️ Masukkan minimal 2 nilai!";
                document.getElementById('error-msg').classList.remove('hidden');
                return;
            }
            document.getElementById('error-msg').classList.add('hidden');

            let {r, s_slant, t, v, l} = vals;

            // Logika Iteratif untuk Pythagoras dan Rumus Kerucut
            for (let i = 0; i < 3; i++) {
                // Relasi Pythagoras: s^2 = r^2 + t^2
                if (!isNaN(r) && !isNaN(t) && isNaN(s_slant)) s_slant = Math.sqrt(r**2 + t**2);
                if (!isNaN(s_slant) && !isNaN(r) && isNaN(t)) t = Math.sqrt(s_slant**2 - r**2);
                if (!isNaN(s_slant) && !isNaN(t) && isNaN(r)) r = Math.sqrt(s_slant**2 - t**2);

                // Volume: V = 1/3 * pi * r^2 * t
                if (!isNaN(r) && !isNaN(t) && isNaN(v)) v = (1/3) * pi * Math.pow(r, 2) * t;
                if (!isNaN(v) && !isNaN(r) && isNaN(t)) t = (3 * v) / (pi * Math.pow(r, 2));
                if (!isNaN(v) && !isNaN(t) && isNaN(r)) r = Math.sqrt((3 * v) / (pi * t));

                // Luas Permukaan: L = pi * r * (r + s)
                if (!isNaN(r) && !isNaN(s_slant) && isNaN(l)) l = pi * r * (r + s_slant);
            }

            // Update UI
            fields.forEach(id => {
                const el = document.getElementById(id);
                const finalVal = {r, s_slant, t, v, l}[id];
                if (!isNaN(finalVal)) {
                    el.value = parseFloat(finalVal.toFixed(2));
                    if (!isManual[id]) {
                        el.classList.remove('input-field');
                        el.classList.add('result-field');
                    }
                }
            });
        }

        function resetForm() {
            ['r', 's_slant', 't', 'v', 'l'].forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.classList.remove('result-field');
                el.classList.add('input-field');
            });
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
