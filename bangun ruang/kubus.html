<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kubus Lengkap</title>
    <script type="text/javascript">
      if (top === self) {
        // Jika halaman dibuka langsung (tidak di dalam iframe),
        // alihkan paksa ke halaman utama blog Anda
        window.location.href = "https://o-cre.blogspot.com/2026/05/kalkulator-bangun-ruang.html";
      }
    </script>
    <link rel="stylesheet" href="bangunruang.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Kalkulator Kubus</h2>
            <p class="description">Input salah satu, sistem hitung semua.</p>
            <img src="rumus/kubus.png" alt="Kubus" height="120px">
        </div>

        <div class="element">
            <div>
                <label>Sisi / Rusuk (s)</label>
                <input type="number" id="s" class="input-field" placeholder="s">
            </div>
            
            <div>
                <label>Diag. Bidang</label>
                <input type="number" id="db" class="input-field" placeholder="db">
            </div>
            <div>
                <label>Diag. Ruang</label>
                <input type="number" id="dr" class="input-field" placeholder="dr">
            </div>
            <div>
                <label>Volume (V)</label>
                <input type="number" id="v" class="input-field" placeholder="V">
            </div>
            <div>
                <label>Luas Permukaan (LP)</label>
                <input type="number" id="lp" class="input-field" placeholder="L">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="hitungKubus()" class="btn-menu">Hitung</button>
            <button onclick="resetForm()" class="btn-menu">Reset</button>
            <a href="../index.html" class="btn-menu">Home</a>
        </div>

        <p id="error-msg" class="message"></p>
    </div>

    <script>
        function hitungKubus() {
            const fields = ['s', 'v', 'lp', 'db', 'dr'];
            let vals = {};
            let isManual = {};

            fields.forEach(id => {
                const el = document.getElementById(id);
                const val = parseFloat(el.value);
                vals[id] = val;
                isManual[id] = !isNaN(val);
                el.classList.remove('result-field');
                el.classList.add('input-field');
            });

            if (Object.values(isManual).filter(v => v).length < 1) {
                document.getElementById('error-msg').innerText = "⚠️ Masukkan minimal 1 nilai!";
                document.getElementById('error-msg').classList.remove('hidden');
                return;
            }
            document.getElementById('error-msg').classList.add('hidden');

            let {s, v, lp, db, dr} = vals;

            // Logika pencarian Sisi (s) dari elemen manapun yang diinput
            if (isNaN(s)) {
                if (!isNaN(v)) s = Math.pow(v, 1/3);
                else if (!isNaN(lp)) s = Math.sqrt(lp / 6);
                else if (!isNaN(db)) s = db / Math.sqrt(2);
                else if (!isNaN(dr)) s = dr / Math.sqrt(3);
            }

            // Setelah s ditemukan (atau jika memang sudah ada), hitung elemen turunan
            if (!isNaN(s)) {
                if (isNaN(v)) v = Math.pow(s, 3);
                if (isNaN(lp)) lp = 6 * Math.pow(s, 2);
                if (isNaN(db)) db = s * Math.sqrt(2);
                if (isNaN(dr)) dr = s * Math.sqrt(3);
            }

            // Update UI
            fields.forEach(id => {
                const el = document.getElementById(id);
                const finalVal = {s, v, lp, db, dr}[id];
                if (!isNaN(finalVal)) {
                    el.value = parseFloat(finalVal.toFixed(2));
                    if (!isManual[id]) {
                        el.classList.remove('input-field');
                        el.classList.add('result-field');
                    }
                }
            });
        }

        function resetForm() {
            ['s', 'v', 'lp', 'db', 'dr'].forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.classList.remove('result-field');
                el.classList.add('input-field');
            });
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
