<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Animasi Bidang Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="absolute top-10 left-10 z-10 space-y-2">
        <button onclick="gerakkanBidang()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
            🚀 Jalankan Animasi
        </button>
        <p class="text-white text-xs opacity-50 px-2 italic">Gunakan Mouse untuk putar kamera</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, bidangSaya;

        function init() {
            // 1. Setup Dasar
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827); // Abu-abu gelap (Slate 900)

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 2. Lampu (Penting agar warna terlihat)
            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

            // 3. Membuat Bidang (Geometry + Material = Mesh)
            const geo = new THREE.PlaneGeometry(2, 2);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x38bdf8, // Biru cerah
                side: THREE.DoubleSide 
            });
            bidangSaya = new THREE.Mesh(geo, mat);
            
            // Rebah di lantai secara default
            bidangSaya.rotation.x = -Math.PI / 2;
            scene.add(bidangSaya);

            // 4. Grid Helper (Lantai Panduan)
            scene.add(new THREE.GridHelper(10, 10, 0x444444, 0x222222));

            animate();
        }

        // --- FUNGSI ANIMASI YANG DIPANGGIL TOMBOL ---
        function gerakkanBidang() {
            // Kita buat urutan gerakan (Timeline)
            let tl = gsap.timeline();

            tl.to(bidangSaya.position, { 
                y: 2,           // Naik ke atas
                duration: 1, 
                ease: "power2.out" 
            })
            .to(bidangSaya.rotation, { 
                z: Math.PI,     // Berputar 180 derajat (sumbu Z)
                duration: 1.5, 
                ease: "elastic.out(1, 0.3)" 
            })
            .to(bidangSaya.material.color, {
                r: 1, g: 0, b: 0, // Berubah jadi merah (RGB: 1, 0, 0)
                duration: 0.5
            })
            .to(bidangSaya.position, { 
                y: 0,           // Turun kembali
                duration: 1, 
                ease: "bounce.out" 
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            // Tambahkan sedikit rotasi halus agar terlihat hidup
            if (bidangSaya && !gsap.isTweening(bidangSaya.rotation)) {
                bidangSaya.rotation.z += 0.005;
            }
            renderer.render(scene, camera);
        }

        init();

        // Antisipasi jika ukuran layar berubah
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
