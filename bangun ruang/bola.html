<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Bola Pro</title>
    <link rel="stylesheet" href="bangunruang.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Kalkulator Bola</h2>
            <p class="description">Masukkan salah satu nilai yang diketahui.</p>
            <img src="rumus/bola.png" alt="Bola" height="120px">
        </div>

        <div class="element">
            <div>
                <label>Pilihan Nilai Pi (π)</label>
                <select id="pi-val" class="selectpi">
                    <option value="3.141592653589793">Math.PI (Presisi Tinggi)</option>
                    <option value="3.14">3.14 (Standar)</option>
                    <option value="3.142857142857143">22/7 (Pecahan)</option>
                </select>
            </div>
            <div>
                <label>Jari-jari (r)</label>
                <input type="number" id="r" class="input-field" placeholder="r">
            </div>
            <div>
                <label>Diameter (d)</label>
                <input type="number" id="d" class="input-field" placeholder="2r">
            </div>
            <div>
                <label>Volume (V)</label>
                <input type="number" id="v" class="input-field" placeholder="4/3 × π × r³">
            </div>            
            <div>
                <label>Luas (L)</label>
                <input type="number" id="l" class="input-field" placeholder="4 × π × r²">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="hitungBola()" class="btn-menu">Hitung</button>
            <button onclick="resetForm()" class="btn-menu">Reset</button>
            <a href="../index.html" class="btn-menu">Home</a>
        </div>

        <p id="error-msg" class="message"></p>
    </div>

    <script>
        function hitungBola() {
            const pi = parseFloat(document.getElementById('pi-val').value);
            const fields = ['r', 'd', 'v', 'l'];
            let vals = {};
            let isManual = {};

            fields.forEach(id => {
                const el = document.getElementById(id);
                const val = parseFloat(el.value);
                vals[id] = val;
                isManual[id] = !isNaN(val);
                el.classList.remove('result-field');
                el.classList.add('input-field');
            });

            if (Object.values(isManual).filter(v => v).length < 1) {
                document.getElementById('error-msg').innerText = "⚠️ Masukkan minimal 1 elemen (misal: r atau V)!";
                document.getElementById('error-msg').classList.remove('hidden');
                return;
            }
            document.getElementById('error-msg').classList.add('hidden');

            let {r, d, v, l} = vals;

            // Logika Perhitungan Bola
            // 1. Dapatkan r terlebih dahulu dari elemen apa pun yang ada
            if (isNaN(r)) {
                if (!isNaN(d)) r = d / 2;
                else if (!isNaN(v)) r = Math.pow((3 * v) / (4 * pi), 1/3);
                else if (!isNaN(l)) r = Math.sqrt(l / (4 * pi));
            }

            // 2. Setelah r didapat, hitung elemen lainnya
            if (!isNaN(r)) {
                if (isNaN(d)) d = 2 * r;
                if (isNaN(v)) v = (4/3) * pi * Math.pow(r, 3);
                if (isNaN(l)) l = 4 * pi * Math.pow(r, 2);
            }

            // Update UI
            fields.forEach(id => {
                const el = document.getElementById(id);
                const finalVal = {r, d, v, l}[id];
                if (!isNaN(finalVal)) {
                    el.value = parseFloat(finalVal.toFixed(4));
                    if (!isManual[id]) {
                        el.classList.remove('input-field');
                        el.classList.add('result-field');
                    }
                }
            });
        }

        function resetForm() {
            ['r', 'd', 'v', 'l'].forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.classList.remove('result-field');
                el.classList.add('input-field');
            });
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
